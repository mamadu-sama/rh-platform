version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rh_postgres
    environment:
      POSTGRES_DB: rh_db
      POSTGRES_USER: rh_user
      POSTGRES_PASSWORD: rh_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
